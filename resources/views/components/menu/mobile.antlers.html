<div
  x-show="mobileMenu"
  x-cloak
  x-transition:enter="transition ease-out duration-200"
  x-transition:enter-start="opacity-0"
  x-transition:enter-end="opacity-100"
  x-transition:leave="transition ease-in duration-150"
  x-transition:leave-start="opacity-100"
  x-transition:leave-end="opacity-0"
  class="md:hidden fixed left-0 w-full h-auto top-[68px] z-40 bg-zinc-900">
  <nav class="max-w-6xl mx-auto px-6 py-8 text-lg text-zinc-400">
    <ul class="flex flex-col gap-4" role="list">
      <li>
        <a href="{{ site:url }}#vorteile" class="hover:text-white" @click="mobileMenu = false" aria-label="{{ 'Vorteile' | trans }}">{{ "Vorteile" | trans }}</a>
      </li>
      <li>
        <a href="{{ site:url }}#schulung" class="hover:text-white" @click="mobileMenu = false" aria-label="{{ 'Schulung' | trans }}">{{ "Schulung" | trans }}</a>
      </li>
      <li>
        <a href="{{ site:url }}#planner" class="hover:text-white" @click="mobileMenu = false" aria-label="{{ 'Planner' | trans }}">{{ "Planner" | trans }}</a>
      </li>
      <li>
        <a href="{{ site:url }}#news" class="hover:text-white" @click="mobileMenu = false" aria-label="{{ 'News' | trans }}">{{ "News" | trans }}</a>
      </li>
      <li>
        <a href="{{ site:url }}#kontakt" class="hover:text-white" @click="mobileMenu = false" aria-label="{{ 'Kontakt' | trans }}">{{ "Kontakt" | trans }}</a>
      </li>
    </ul>
  </nav>

  {{# Language #}}
  <div class="max-w-6xl mx-auto px-6 pb-4 border-t border-white/10 pt-4">
    <div class="flex items-center gap-3 text-base text-zinc-400">
      {{ locales }}
        {{ if locale:key == site:handle }}
          <span class="text-white font-medium">
            {{ locale:short | upper }}
          </span>
        {{ else }}
          <a href="{{ url }}" class="hover:text-white" aria-label="{{ locale:name }}">{{ locale:short | upper }}</a>
        {{ /if }}
      {{ /locales }}
    </div>
  </div>
</div>
