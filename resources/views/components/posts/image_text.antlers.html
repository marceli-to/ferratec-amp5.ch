<div class="max-w-6xl mx-auto px-6">

  <div class="mt-16 md:mt-24 grid md:grid-cols-2 gap-px bg-zinc-200">

    {{ if image }}
      <img src="{{ image }}" alt="" class="w-full h-full object-cover">
    {{ /if }}

    <div class="bg-white p-8 md:p-12 flex flex-col justify-center">

      {{ if label }}
        <p class="text-sm text-accent font-semibold mb-3">
          {{ label }}
        </p>
      {{ /if }}

      {{ if heading }}
        <h3 class="text-2xl font-semibold tracking-tight mb-4">
          {{ heading }}
        </h3>
      {{ /if }}

      {{ if text }}
        <p class="text-zinc-500">
          {{ text }}
        </p>
      {{ /if }}

    </div>
    
  </div>

</div>
