title: Post
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              localizable: true
              validate:
                - required
          -
            handle: date
            field:
              type: date
              required: true
              default: now
              display: Date
              localizable: true
              validate:
                - required
          -
            handle: teaser
            field:
              type: textarea
              display: Teaser
              instructions: 'Short text shown in the news overview on the homepage.'
              localizable: true
          -
            handle: image
            field:
              type: assets
              display: 'Hero Image'
              container: assets
              max_files: 1
              localizable: true
          -
            handle: elements
            field:
              type: replicator
              display: Elements
              localizable: true
              collapse: true
              sets:
                content:
                  display: Content
                  sets:
                    text:
                      display: Text
                      icon: fieldtype-text
                      fields:
                        -
                          handle: heading
                          field:
                            type: text
                            display: Heading
                            localizable: false
                        -
                          handle: text
                          field:
                            type: bard
                            display: Text
                            buttons:
                              - h2
                              - h3
                              - bold
                              - italic
                              - unorderedlist
                              - anchor
                            localizable: false
                            toolbar_mode: floating
                            link_collections:
                              - posts
                            container: assets
                            remove_empty_nodes: false
                    image:
                      display: Image
                      icon: media-image-camera
                      fields:
                        -
                          handle: image
                          field:
                            type: assets
                            display: Image
                            container: assets
                            max_files: 1
                            localizable: false
                        -
                          handle: caption
                          field:
                            type: textarea
                            display: Caption
                            localizable: false
                    image_text:
                      display: 'Image & Text'
                      icon: hero-image-above-text
                      fields:
                        -
                          handle: image
                          field:
                            type: assets
                            display: Image
                            container: assets
                            max_files: 1
                            localizable: false
                        -
                          handle: label
                          field:
                            type: text
                            display: Label
                            localizable: false
                        -
                          handle: heading
                          field:
                            type: text
                            display: Heading
                            localizable: false
                        -
                          handle: text
                          field:
                            type: textarea
                            display: Text
                            localizable: false
                    video:
                      display: Video
                      icon: movie-video-clip
                      fields:
                        -
                          handle: video_url
                          field:
                            type: text
                            display: 'Video URL'
                            instructions: 'URL to the video file (mp4).'
                            localizable: false
                        -
                          handle: poster
                          field:
                            type: assets
                            display: 'Poster Image'
                            container: assets
                            max_files: 1
                            localizable: false
  settings:
    display: Settings
    sections:
      -
        display: SEO
        fields:
          -
            import: seo
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
